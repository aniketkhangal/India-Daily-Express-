        // Render Article Function
        function loadArticle(articleId) {
            const article = articles[articleId];
            if (!article) return;

            // Clear search bar if a specific article is chosen
            document.getElementById('searchInput').value = '';

            const articleView = document.getElementById('article-view');
            articleView.classList.add('page-transition');

            setTimeout(() => {
                articleView.innerHTML = `
                    <span class="category-tag">${article.category}</span>
                    <h2 class="article-title">${article.title}</h2>
                    <div class="meta">By <b>${article.author}</b> • Published: ${article.date}</div>
                    <img src="${article.image}" alt="${article.title}" class="article-hero-image" />
                    <div class="article-content">${article.content}</div>
                `;

                // Update Sidebar Related
                const relatedList = document.getElementById('related-list');
                relatedList.innerHTML = article.related.map(relId => {
                    const rel = articles[relId];
                    return `
                        <li>
                            <a onclick="loadArticle('${rel.id}')">${rel.title}</a>
                            <div class="sub-info">${rel.category} • ${rel.date}</div>
                        </li>
                    `;
                }).join('');

                // Update Sidebar Headlines
                renderSidebarTrending();

                window.scrollTo({ top: 0, behavior: 'smooth' });
                articleView.classList.remove('page-transition');
            }, 250);
        }

        function renderSidebarTrending() {
            const trendingList = document.getElementById('trending-list');
            trendingList.innerHTML = Object.keys(articles).map(key => {
                const item = articles[key];
                return `
                    <li>
                        <a onclick="loadArticle('${item.id}')">${item.title}</a>
                    </li>
                `;
            }).join('');
        }

        // LIVE SEARCH LOGIC
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const articleView = document.getElementById('article-view');

            if (query === '') {
                // Return to default article if search input is cleared
                loadArticle('india-1');
                return;
            }

            // Filter articles matching search query
            const matchedArticles = Object.values(articles).filter(art => {
                return art.title.toLowerCase().includes(query) ||
                       art.category.toLowerCase().includes(query) ||
                       art.content.toLowerCase().includes(query);
            });

            // Render Search Results View
            if (matchedArticles.length > 0) {
                articleView.innerHTML = `
                    <h2>🔍 Search Results (${matchedArticles.length})</h2>
                    <p>Articles containing keyword "<b>${query}</b>":</p>
                    <div class="search-results-grid">
                        ${matchedArticles.map(art => `
                            <div class="search-card" onclick="loadArticle('${art.id}')">
                                <img src="${art.image}" alt="${art.title}">
                                <div class="search-card-body">
                                    <span class="category-tag" style="font-size:0.65rem;">${art.category}</span>
                                    <h4>${art.title}</h4>
                                    <div class="meta" style="border:none; margin:0; padding:0;">${art.date}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                articleView.innerHTML = `
                    <h2>🔍 Search Results</h2>
                    <p style="color: #777; margin-top: 20px;">No news articles found matching "<b>${query}</b>". Try searching for <i>ISRO</i>, <i>UPI</i>, <i>AI</i>, or <i>Railways</i>.</p>
                `;
            }
        }

        // Initial Load
        loadArticle('india-1');
    </script>
</body>
</html>
